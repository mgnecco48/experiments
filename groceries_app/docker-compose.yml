services:
  mongo:
    image: mongo:7
    container_name: grocery_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - grocery_net

  api:
    build: ./api
    container_name: grocery_api
    restart: always
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - grocery_net

  worker:
    build: ./worker
    container_name: grocery_worker
    restart: always
    depends_on:
      - mongo
    env_file:
      - .env
    networks:
      - grocery_net

volumes:
  mongo_data:

networks:
  grocery_net:
    driver: bridge
